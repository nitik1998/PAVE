# Per-method configuration. Lazy-loaded — nothing here triggers a download
# until the relevant scripts/run_probes.py --method ... is invoked.

dinov3:
  hf_id: facebook/dinov3-vitb16-pretrain-lvd1689m
  fallback_hf_id: facebook/dinov2-base                # if dinov3 not yet on local hub
  patch_size: 16
  image_size: 448                                     # 28 x 28 patch grid
  feature_dim: 768
  pool: patch_tokens

dinov2:
  hf_id: facebook/dinov2-base
  patch_size: 14
  image_size: 448                                     # 32 x 32 patch grid
  feature_dim: 768
  pool: patch_tokens

siglip2:
  hf_id: google/siglip2-base-patch16-naflex
  fallback_hf_id: google/siglip-base-patch16-256
  patch_size: 16
  image_size: 384                                     # naflex auto-handles, 384 is safe
  feature_dim: 768
  pool: patch_tokens

qwen25vl:
  hf_id: Qwen/Qwen2.5-VL-3B-Instruct
  prompt_template: |
    Detect every region of the image that is the {affordance_phrase}.
    Return a JSON list of bounding boxes in absolute pixel coordinates of
    the form {{"bbox_2d": [x1, y1, x2, y2], "label": "{class_name}"}}.
  refine_with_sam2: true

molmoe:
  hf_id: allenai/MolmoE-1B-0924
  prompt_template: "Point to the {affordance_phrase} in this image."
  refine_with_sam2: true

# Stretch goal — week 1 of the 6-week plan.
openpi_siglip:
  weights_repo: https://github.com/Physical-Intelligence/openpi
  pytorch_port_repo: https://github.com/allenzren/open-pi-zero  # community torch port
  checkpoint: pi0_base                                # pi0_base or pi05_base
  notes: |
    Extract the SigLIP-So400m vision tower from the loaded checkpoint, attach
    a linear probe head, and run the same protocol as M1/M2.

sam2:
  hf_id: facebook/sam2.1-hiera-base-plus
  weights: outputs/checkpoints/sam2/sam2.1_hiera_base_plus.pt
  config: configs/sam2.1/sam2.1_hiera_b+.yaml         # ships inside the sam2 pip package

panda_policy:
  hf_repo: enaitzb/TQC-PandaPush-v3
  hf_filename: TQC_no_load_env-PandaPush-v3.zip
  algo: TQC
  env_id: PandaPush-v3
